<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowFlex.com — Fed Tracker & Analyst Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0f14;
      --bg-panel: #12161d;
      --bg-card: #181d27;
      --border: #252b36;
      --border-soft: #1a1f28;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --warn: #eab308;
      --warn-dim: #ca8a04;
      --muted: #64748b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --glow: rgba(34, 197, 94, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 197, 94, 0.06), transparent 50%),
        radial-gradient(ellipse 50% 30% at 100% 0%, rgba(234, 179, 8, 0.04), transparent 40%);
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0 1.25rem;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 1.25rem;
    }
    .logo { font-weight: 700; font-size: 1.6rem; color: var(--accent); letter-spacing: 0.03em; }
    .tagline { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .wallet-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--warn);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contract-in {
      width: 220px;
      padding: 0.5rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
    }
    .btn {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
    }
    .btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { box-shadow: 0 0 16px var(--glow); }
    .btn.small { padding: 0.35rem 0.75rem; font-size: 0.82rem; }

    .hero {
      text-align: center;
      padding: 2rem 1.25rem;
      background: linear-gradient(180deg, var(--bg-card) 0%, transparent 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }
    .hero h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .hero p { color: var(--text-dim); font-size: 0.92rem; max-width: 42ch; margin: 0 auto; }

    .stats-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-card {
      flex: 1;
      min-width: 140px;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
    }
    .stat-card .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .stat-card .value { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; color: var(--accent); }
    .stat-card .value.warn { color: var(--warn); }

    .tabs { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
    .tab {
      padding: 0.5rem 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.86rem;
      font-weight: 500;
    }
    .tab:hover { color: var(--text); }
    .tab.active { border-color: var(--accent-dim); color: var(--accent); background: var(--glow); }

    .panel { display: none; }
    .panel.visible { display: block; }

    .terminal-box {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .terminal-box .row { padding: 0.2rem 0; border-bottom: 1px solid var(--border-soft); }
    .terminal-box .row:last-child { border-bottom: none; }
    .terminal-box .head { color: var(--accent); font-weight: 600; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card h3 { font-size: 0.95rem; margin-bottom: 0.75rem; color: var(--text); }
    .card .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--text-dim); }

    .feed-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border-soft); }
    .feed-row:last-child { border-bottom: none; }
    .feed-idx { color: var(--accent); font-weight: 500; }
    .feed-val { font-family: 'JetBrains Mono', monospace; }
    .feed-stale { color: var(--warn); font-size: 0.75rem; }

    .msg { padding: 0.75rem; border-radius: var(--radius-sm); margin-bottom: 1rem; font-size: 0.88rem; }
    .msg.err { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .msg.ok { background: var(--glow); border: 1px solid rgba(34, 197, 94, 0.25); color: var(--accent); }

    .resolve-in { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .resolve-in input {
      width: 120px;
      padding: 0.45rem 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
    }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-soft); font-size: 0.8rem; color: var(--text-dim); text-align: center; }

    @media (max-width: 640px) {
      .app { padding: 1rem 0.75rem; }
      .hero { padding: 1.5rem 1rem; }
      .hero h1 { font-size: 1.25rem; }
      .stat-card { min-width: 100%; }
      .contract-in { width: 100%; max-width: 280px; }
      .header-right { width: 100%; }
    }
    @media print {
      .btn, .tab, .contract-in, #btnConnect, #btnRefresh, #btnResolve { display: none !important; }
      .terminal-box { border: 1px solid #333; }
    }
    .loading { opacity: 0.7; pointer-events: none; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { margin-left: 0.5rem; padding: 0.2rem 0.4rem; font-size: 0.7rem; cursor: pointer; }
    .role-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; background: var(--border); color: var(--text-dim); }
    .role-badge.relay { background: rgba(34, 197, 94, 0.2); color: var(--accent); }
    .role-badge.guardian { background: rgba(234, 179, 8, 0.2); color: var(--warn); }
    .info-line { display: flex; justify-content: space-between; padding: 0.35rem 0; font-size: 0.85rem; }
    .info-line .k { color: var(--text-dim); }
    .info-line .v { font-family: 'JetBrains Mono', monospace; color: var(--text); }
    .panel.visible .card { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .badge { display: inline-block; padding: 0.15rem 0.4rem; font-size: 0.7rem; border-radius: 4px; background: var(--border); }
    .badge.green { background: rgba(34, 197, 94, 0.2); color: var(--accent); }
    .badge.yellow { background: rgba(234, 179, 8, 0.2); color: var(--warn); }
    .table-wrap { overflow-x: auto; }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .table-wrap th, .table-wrap td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .table-wrap th { color: var(--accent); font-weight: 600; }
    .table-wrap tr:hover { background: var(--border-soft); }
    input:focus, .btn:focus { outline: none; border-color: var(--accent-dim); }
    .muted { color: var(--text-dim); }
    .hl { color: var(--accent); }
    .warn { color: var(--warn); }
    ol.mono, ul.mono { font-family: 'JetBrains Mono', monospace; }
    .card h4 { font-weight: 600; color: var(--text); }
    #msgBox .msg { word-break: break-word; }
    .stat-card .value.positive { color: var(--accent); }
    .stat-card .value.negative { color: #f87171; }
    .feed-row .feed-val.positive { color: var(--accent); }
    .feed-row .feed-val.negative { color: #f87171; }
    @media (prefers-reduced-motion: reduce) {
      .panel.visible .card { animation: none; }
      .pulse { animation: none; }
    }
    .terminal-box .row:nth-child(even) { background: rgba(255,255,255,0.02); }
    .terminal-box .row.head { background: rgba(34, 197, 94, 0.08); }
    footer a { color: var(--accent-dim); }
    footer a:hover { color: var(--accent); }
    .app > section + footer { margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">PowFlex.com</div>
        <div class="tagline">Fed tracker & analyst terminal — policy bands, signals, feeds</div>
      </div>
      <div class="header-right">
        <input type="text" class="contract-in" id="contractAddr" placeholder="Jer0me contract address" />
        <span class="wallet-addr" id="walletAddr">—</span>
        <button type="button" class="btn primary" id="btnConnect">Connect</button>
        <button type="button" class="btn" id="btnRefresh">Refresh</button>
      </div>
    </header>

    <section class="hero">
      <h1>Policy band ledger & analyst terminal</h1>
