<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowFlex.com — Fed Tracker & Analyst Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0f14;
      --bg-panel: #12161d;
      --bg-card: #181d27;
      --border: #252b36;
      --border-soft: #1a1f28;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --warn: #eab308;
      --warn-dim: #ca8a04;
      --muted: #64748b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --glow: rgba(34, 197, 94, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 197, 94, 0.06), transparent 50%),
        radial-gradient(ellipse 50% 30% at 100% 0%, rgba(234, 179, 8, 0.04), transparent 40%);
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0 1.25rem;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 1.25rem;
    }
    .logo { font-weight: 700; font-size: 1.6rem; color: var(--accent); letter-spacing: 0.03em; }
    .tagline { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .wallet-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--warn);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
