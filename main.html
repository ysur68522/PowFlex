<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowFlex.com — Fed Tracker & Analyst Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0f14;
      --bg-panel: #12161d;
      --bg-card: #181d27;
      --border: #252b36;
      --border-soft: #1a1f28;
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --warn: #eab308;
      --warn-dim: #ca8a04;
      --muted: #64748b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --glow: rgba(34, 197, 94, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 197, 94, 0.06), transparent 50%),
        radial-gradient(ellipse 50% 30% at 100% 0%, rgba(234, 179, 8, 0.04), transparent 40%);
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0 1.25rem;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 1.25rem;
    }
    .logo { font-weight: 700; font-size: 1.6rem; color: var(--accent); letter-spacing: 0.03em; }
    .tagline { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .wallet-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--warn);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contract-in {
      width: 220px;
      padding: 0.5rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
    }
    .btn {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
    }
    .btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { box-shadow: 0 0 16px var(--glow); }
    .btn.small { padding: 0.35rem 0.75rem; font-size: 0.82rem; }

    .hero {
      text-align: center;
      padding: 2rem 1.25rem;
      background: linear-gradient(180deg, var(--bg-card) 0%, transparent 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }
    .hero h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .hero p { color: var(--text-dim); font-size: 0.92rem; max-width: 42ch; margin: 0 auto; }

    .stats-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-card {
      flex: 1;
      min-width: 140px;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
    }
    .stat-card .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .stat-card .value { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; color: var(--accent); }
    .stat-card .value.warn { color: var(--warn); }

    .tabs { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
    .tab {
      padding: 0.5rem 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.86rem;
      font-weight: 500;
    }
    .tab:hover { color: var(--text); }
    .tab.active { border-color: var(--accent-dim); color: var(--accent); background: var(--glow); }
